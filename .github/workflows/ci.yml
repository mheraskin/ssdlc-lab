name: CI

# DevSecOps pipeline (SSDLC: security testing). On every push/PR:
#   - SAST: PHPStan (PHP) + Semgrep (security rules across PHP & JS)
#   - Software composition analysis: composer audit + npm audit
#   - Tests: PHPUnit + svelte-check
# DAST (dynamic scanning) lives in dast.yml (runnable on demand / on a schedule).

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend (SAST + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      # Point at the CI Postgres service; the test suite uses the "_test" suffixed DB.
      DATABASE_URL: "postgresql://app:app@127.0.0.1:5432/ssdlc_bank?serverVersion=16&charset=utf8"
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: ssdlc_bank
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U app" --health-interval 5s --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_pgsql, intl, opcache, zip
          tools: composer:v2

      - name: Seed .env (required by post-install cache:clear)
        run: cp .env.example .env

      - name: Install dependencies
        run: composer install --no-interaction --no-progress

      - name: Generate JWT keys
        run: php bin/console lexik:jwt:generate-keypair --no-interaction

      - name: SAST — static analysis (PHPStan)
        run: vendor/bin/phpstan analyse --no-progress --memory-limit=512M

      - name: Dependency vulnerability audit
        run: composer audit
        continue-on-error: true # report advisories without blocking the lab build

      - name: Prepare test database
        run: |
          php bin/console doctrine:database:create --env=test --if-not-exists -n
          php bin/console doctrine:migrations:migrate --env=test -n

      - name: Tests (PHPUnit — unit + functional)
        env:
          APP_ENV: test
        run: php bin/phpunit

  frontend:
    name: Frontend (type check + audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check (svelte-check)
        run: npm run check

      - name: Dependency vulnerability audit
        run: npm audit --audit-level=high
        continue-on-error: true

  semgrep:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
      # Security-focused rulesets covering injection, XSS, secrets, PHP and JS/TS.
      # Reports findings to the job log + SARIF; non-blocking for the lab build.
      - name: Semgrep scan
        run: semgrep scan --config p/security-audit --config p/secrets --config p/php --config p/javascript --sarif --output semgrep.sarif
        continue-on-error: true
      - name: Upload SARIF
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-sarif
          path: semgrep.sarif
        if: always()

monolog:
    channels:
        - deprecation # Deprecations are logged in the dedicated "deprecation" channel when it exists
        - security    # Audit / SIEM-ready security events (autowired as $securityLogger)

when@dev:
    monolog:
        handlers:
            main:
                type: stream
                path: "%kernel.logs_dir%/%kernel.environment%.log"
                level: debug
                channels: ["!event"]
            console:
                type: console
                process_psr_3_messages: false
                channels: ["!event", "!doctrine", "!console"]
            # Forward ERROR+ records (incl. unhandled exceptions) to Sentry. No-op without DSN.
            sentry:
                type: service
                id: Sentry\Monolog\Handler
                level: error

when@test:
    monolog:
        handlers:
            main:
                type: fingers_crossed
                action_level: error
                handler: nested
                excluded_http_codes: [404, 405]
                channels: ["!event"]
            nested:
                type: stream
                path: "%kernel.logs_dir%/%kernel.environment%.log"
                level: debug

when@prod:
    monolog:
        handlers:
            main:
                type: fingers_crossed
                action_level: error
                handler: nested
                excluded_http_codes: [404, 405]
                channels: ["!deprecation", "!security"]
                buffer_size: 50 # How many messages should be saved? Prevent memory leaks
            nested:
                type: stream
                path: php://stderr
                level: debug
                formatter: monolog.formatter.json
            console:
                type: console
                process_psr_3_messages: false
                channels: ["!event", "!doctrine"]
            deprecation:
                type: stream
                channels: [deprecation]
                path: php://stderr
                formatter: monolog.formatter.json
            # Security/audit events are always emitted (info level) as JSON to stderr so a
            # real SIEM or the DigitalOcean log pipeline can ingest them. "SIEM-ready".
            security:
                type: stream
                channels: [security]
                path: php://stderr
                level: info
                formatter: monolog.formatter.json
            # Forward ERROR+ records (incl. unhandled exceptions) to Sentry. No-op without DSN.
            sentry:
                type: service
                id: Sentry\Monolog\Handler
                level: error
